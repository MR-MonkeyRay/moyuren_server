server:
  host: "0.0.0.0"
  port: 8000
  base_domain: "http://127.0.0.1:8000"

timezone:
  business: "Asia/Shanghai"
  display: "local"

paths:
  cache_dir: "cache"

scheduler:
  mode: "hourly"
  daily_times:
  - "06:00"
  minute_of_hour: 0

cache:
  retain_days: 30

ops:
  api_key: ""

templates:
  default: "moyuren"
  dir: "templates"
  config:
    device_scale_factor: 3
    jpeg_quality: 100
    use_china_cdn: true

data_sources:
  - type: "news"
    url: "https://60s.viki.moe/v2/60s"
    timeout_sec: 10
    params:
      "force-update": "false"

  - type: "fun_content"
    timeout_sec: 5
    endpoints:
      - name: "dad_joke"
        url: "https://60s.viki.moe/v2/dad-joke"
        data_path: "data.content"
        display_title: "🤣 冷笑话"
      - name: "hitokoto"
        url: "https://60s.viki.moe/v2/hitokoto"
        data_path: "data.hitokoto"
        display_title: "💬 一言"
      - name: "duanzi"
        url: "https://60s.viki.moe/v2/duanzi"
        data_path: "data.duanzi"
        display_title: "😂 搞笑段子"
      - name: "moyu_quote"
        url: "https://60s.viki.moe/v2/moyu"
        data_path: "data.moyuQuote"
        display_title: "🐟 摸鱼语录"

  - type: "crazy_thursday"
    enabled: true
    url: "https://60s.viki.moe/v2/kfc"
    timeout_sec: 5

  - type: "holiday"
    timeout_sec: 10
    mirror_urls:
      - "https://ghfast.top/"

  - type: "stock_index"
    quote_url: "https://push2delay.eastmoney.com/api/qt/ulist.np/get"
    timeout_sec: 5
    secids:
      - "1.000001"   # 上证指数
      - "0.399001"   # 深证成指
      - "0.399006"   # 创业板指
      - "100.HSI"    # 恒生指数
      - "100.DJIA"   # 道琼斯
    market_timezones:
      A: "Asia/Shanghai"
      HK: "Asia/Hong_Kong"
      US: "America/New_York"
    cache_ttl_sec: 60

  - type: "gold_price"
    url: "https://60s.viki.moe/v2/gold-price"
    timeout_sec: 5

logging:
  level: "INFO"
  file: "logs/app.log"
