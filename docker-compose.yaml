version: '3.8'

services:
  moyuren-server:
    container_name: moyuren-server
    image: docker.io/monkeyray/moyuren-server:latest
    ports:
      - "${SERVER_PORT:-8000}:${SERVER_PORT:-8000}"
    volumes:
      - ./cache:/app/cache
    environment:
      # Timezone configuration (system-level, not part of pydantic-settings)
      TZ: Asia/Shanghai

      # Server configuration (pydantic-settings with env_nested_delimiter="_")
      SERVER_HOST: ${SERVER_HOST:-0.0.0.0}
      SERVER_PORT: ${SERVER_PORT:-8000}
      SERVER_BASE_DOMAIN: ${SERVER_BASE_DOMAIN:-http://127.0.0.1:8000}

      # Scheduler configuration (JSON array format required)
      SCHEDULER_DAILY_TIMES: '${SCHEDULER_DAILY_TIMES:-["06:00"]}'

      # Cache configuration
      CACHE_RETAIN_DAYS: ${CACHE_RETAIN_DAYS:-30}

      # Ops API configuration (留空则禁用 ops 端点鉴权)
      OPS_API_KEY: ${OPS_API_KEY:-}

      # Logging configuration (default: stdout only)
      LOGGING_LEVEL: ${LOGGING_LEVEL:-INFO}
      # LOGGING_FILE: ${LOGGING_FILE:-}  # 设置此变量可启用文件日志

      # Note: Holiday, fun_content, crazy_thursday, stock_index 等数据源配置
      # 现在统一在 config.yaml 的 data_sources 列表中管理，无法通过环境变量覆盖单个项
      # 如需修改这些配置，请直接编辑 config.yaml 文件

    restart: unless-stopped

    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:${SERVER_PORT:-8000}/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s